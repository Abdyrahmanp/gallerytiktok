name: nostalgic_reel
description: "TikTok-style local video feed - rediscover your forgotten memories."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Video playback
  video_player: ^2.8.3
  chewie: ^1.7.5

  # Gallery / media access
  photo_manager: ^3.3.0

  # Permissions
  permission_handler: ^11.3.1

  # Local database (Hive)
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # State management
  flutter_riverpod: ^2.5.1

  # UI utilities
  flutter_animate: ^4.5.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  share_plus: ^9.0.0
  intl: ^0.19.0
  google_fonts: ^6.2.1
  path_provider: ^2.1.3
  collection: ^1.18.0
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.8
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
